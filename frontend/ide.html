<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description"
        content="WordPress Agent IDE — browser-based code editor for WordPress themes and plugins" />
    <title>WordPress IDE — Code Editor</title>

    <!-- Design System -->
    <link rel="stylesheet" href="css/tokens.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/ide.css">
</head>

<body class="ide-page">
    <!-- ── Header ── -->
    <header class="ide-header">
        <div class="header-left">
            <div class="logo">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2L2 7l10 5 10-5-10-5z" />
                    <path d="M2 17l10 5 10-5" />
                    <path d="M2 12l10 5 10-5" />
                </svg>
                <span>WP Agent IDE</span>
            </div>
            <span class="file-info-label" id="ide-file-info"></span>
        </div>
        <div class="header-right">
            <button class="btn" id="ide-wrap-btn">Wrap: Off</button>
            <button class="btn primary" id="ide-save-btn">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" />
                    <polyline points="17 21 17 13 7 13 7 21" />
                    <polyline points="7 3 7 8 15 8" />
                </svg>
                Save
            </button>
            <a href="/" class="btn" title="Back to Chat">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
                </svg>
                Chat
            </a>
        </div>
    </header>

    <!-- ── Sidebar ── -->
    <aside id="ide-sidebar">
        <div class="ide-sidebar-section">
            <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:8px;">
                <span class="ide-section-title" style="margin-bottom:0;">Explorer</span>
                <div style="display:flex; gap:4px;">
                    <button class="btn" id="ide-new-file-btn" title="New File"
                        style="padding:4px 8px; font-size:0.75rem; gap:4px;">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                            <polyline points="14,2 14,8 20,8" />
                            <line x1="12" y1="13" x2="12" y2="19" />
                            <line x1="9" y1="16" x2="15" y2="16" />
                        </svg>
                        File
                    </button>
                    <button class="btn" id="ide-new-folder-btn" title="New Folder"
                        style="padding:4px 8px; font-size:0.75rem; gap:4px;">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" />
                            <line x1="12" y1="11" x2="12" y2="17" />
                            <line x1="9" y1="14" x2="15" y2="14" />
                        </svg>
                        Folder
                    </button>
                </div>
            </div>
            <div class="root-grid" id="ide-root-grid">
                <!-- Populated by ide.js -->
            </div>
        </div>
        <div id="file-tree-container">
            <!-- Populated by ide.js -->
        </div>
    </aside>


    <!-- ── Editor Area ── -->
    <main id="ide-editor-area">
        <div id="ide-tabs-bar">
            <!-- Tabs injected by ide.js -->
        </div>
        <div id="ide-editor-container">
            <!-- Welcome overlay injected by ide.js when no tabs are open -->
            <div id="ide-welcome">
                <div style="opacity:.18; margin-bottom: 20px;">
                    <svg width="72" height="72" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="1.5">
                        <polyline points="16 18 22 12 16 6"></polyline>
                        <polyline points="8 6 2 12 8 18"></polyline>
                    </svg>
                </div>
                <h2>WordPress Code Editor</h2>
                <p>Select a file from the sidebar to start editing.<br>Only themes and plugins are editable.</p>
                <p>Press <kbd>Ctrl+S</kbd> to save.</p>
            </div>
        </div>
    </main>

    <!-- ── Toast Container ── -->
    <div id="ide-toast-container"></div>

    <!-- ── Create File/Folder Modal ── -->
    <div id="ide-modal-overlay">
        <div class="ide-modal">
            <h3>Create New File</h3>
            <input type="text" id="ide-modal-input" placeholder="style.css" />
            <div class="ide-modal-actions">
                <button class="btn" id="ide-modal-cancel">Cancel</button>
                <button class="btn primary" id="ide-modal-submit">Create</button>
            </div>
        </div>
    </div>

    <!-- Monaco loader -->
    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>

    <!-- JS: load order matters -->
    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/ide.js"></script>
</body>

</html>
