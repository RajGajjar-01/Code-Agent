# =============================================================================
# NGINX CONFIGURATION - React SPA with API Proxy
# =============================================================================
# This configuration file tells nginx how to serve your React application
# and how to proxy API requests to your FastAPI backend.
#
# FILE LOCATION: /etc/nginx/conf.d/default.conf
# This file is copied to this location in the Dockerfile.
#
# NGINX CONFIGURATION HIERARCHY:
# -----------------------------------------------------------------------------
# /etc/nginx/
# ├── nginx.conf           # Main configuration (don't modify)
# │   └── includes /etc/nginx/conf.d/*.conf
# └── conf.d/
#     └── default.conf     # This file - our custom configuration
#
# The main nginx.conf automatically includes all .conf files from conf.d/
# =============================================================================

# -----------------------------------------------------------------------------
# UPSTREAM BLOCK - Backend Service Definition
# -----------------------------------------------------------------------------
# upstream defines a group of servers that can be referenced by name.
# This is useful for load balancing and service discovery.
#
# WHY USE UPSTREAM?
# - Abstracts the backend URL (can change without modifying multiple places)
# - Enables load balancing if you have multiple backend instances
# - Railway uses internal DNS for service discovery
#
# RAILWAY PRIVATE NETWORKING:
# -----------------------------------------------------------------------------
# In Railway, services can communicate via private network:
# - Service name: "backend" (or whatever you name it)
# - Internal domain: backend.railway.internal
# - Or use: ${{Backend.RAILWAY_PRIVATE_DOMAIN}}
#
# For this configuration, we use the Railway environment variable approach:
# The backend URL will be set via environment variable at runtime.
#
# However, nginx doesn't natively support environment variables in config.
# We use a startup script to substitute variables (shown in comments below).
#
# For Railway, we can use the service's private domain directly:
# backend.railway.internal:8000 (if service is named "backend")
# -----------------------------------------------------------------------------

# Define backend upstream (adjust service name as needed)
# In Railway, use the private domain for internal communication
upstream backend {
    # Railway private networking - replace 'backend' with your service name
    # Format: <service-name>.railway.internal:<port>
    server backend.railway.internal:8000;
    
    # Alternative: Use public domain (has egress costs)
    # server backend.up.railway.app:443;
    
    # Keep alive connections for better performance
    keepalive 32;
}

# -----------------------------------------------------------------------------
# SERVER BLOCK - Main Configuration
# -----------------------------------------------------------------------------
# server block defines how to handle requests for a specific domain/port.
# We listen on port 80 (HTTP) for all incoming requests.
#
# Railway handles HTTPS termination automatically:
# - External traffic comes via HTTPS (your-app.up.railway.app)
# - Railway terminates SSL and forwards HTTP to your container
# - You don't need to configure SSL in nginx

server {
    # Listen on port 80 (HTTP)
    # Railway routes external HTTPS traffic to this port
    listen 80;
    listen [::]:80;  # IPv6 support
    
    # Server name (domain)
    # _ matches any domain (catch-all)
    # Railway provides the actual domain via RAILWAY_PUBLIC_DOMAIN
    server_name _;
    
    # Root directory for static files
    # This is where our React build output is copied
    root /usr/share/nginx/html;
    
    # Default file to serve for directories
    index index.html;
    
    # =========================================================================
    # SECURITY HEADERS
    # =========================================================================
    # These headers protect against common web vulnerabilities.
    # They're set for all responses.
    
    # Prevent clickjacking attacks
    # DENY: Completely prevents framing
    # SAMEORIGIN: Only allows framing from same origin
    # ALLOW-FROM uri: (deprecated, avoid)
    add_header X-Frame-Options "SAMEORIGIN" always;
    
    # Prevent MIME type sniffing
    # Forces browsers to respect declared Content-Type
    add_header X-Content-Type-Options "nosniff" always;
    
    # Enable XSS protection in browsers
    # 1; mode=block: Blocks page on detection instead of sanitizing
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Control referrer information
    # strict-origin: Send full URL for same-origin requests
    #                 Send origin only for cross-origin HTTPS→HTTPS
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Content Security Policy (CSP)
    # Uncomment and customize based on your needs
    # add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" always;
    
    # =========================================================================
    # GZIP COMPRESSION
    # =========================================================================
    # Compress responses to reduce bandwidth and improve load times.
    # Modern browsers all support gzip.
    
    # Enable gzip compression
    gzip on;
    
    # Minimum file size to compress (small files don't benefit)
    gzip_min_length 256;
    
    # Compression level (1-9, higher = more compression but slower)
    gzip_comp_level 5;
    
    # MIME types to compress
    gzip_types
        application/atom+xml
        application/geo+json
        application/javascript
        application/x-javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rdf+xml
        application/rss+xml
        application/vnd.ms-fontobject
        application/wasm
        application/x-web-app-manifest+json
        application/xhtml+xml
        application/xml
        font/eot
        font/otf
        font/ttf
        image/bmp
        image/svg+xml
        text/cache-manifest
        text/calendar
        text/css
        text/javascript
        text/markdown
        text/plain
        text/xml
        text/vcard
        text/vnd.rim.location.xloc
        text/vtt
        text/x-component
        text/x-cross-domain-policy;
    
    # Vary header tells caches to consider Accept-Encoding
    gzip_vary on;
    
    # =========================================================================
    # API PROXY - Forward Backend Requests
    # =========================================================================
    # These location blocks proxy requests to the FastAPI backend.
    # This solves CORS issues and enables secure communication.
    
    # -------------------------------------------------------------------------
    # /api/* - API Endpoints
    # -------------------------------------------------------------------------
    # All requests starting with /api are forwarded to the backend.
    # This includes authentication, chat, drive, and all other API routes.
    
    location /api/ {
        # Proxy to backend upstream defined above
        proxy_pass http://backend/api/;
        
        # Pass original host header (some backends need it)
        proxy_set_header Host $host;
        
        # Pass real client IP (backend sees real IP, not nginx IP)
        proxy_set_header X-Real-IP $remote_addr;
        
        # Pass the chain of client IPs for proxied requests
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # Pass the original protocol (http or https)
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support (needed for some features)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Timeout settings
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Don't buffer responses (good for SSE/streaming)
        proxy_buffering off;
        
        # Disable caching for API responses
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
    
    # -------------------------------------------------------------------------
    # /uploads/* - Static File Uploads
    # -------------------------------------------------------------------------
    # Your backend serves uploaded files from /uploads endpoint.
    # We proxy these requests to the backend as well.
    
    location /uploads/ {
        # Proxy to backend
        proxy_pass http://backend/uploads/;
        
        # Headers for proper forwarding
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Cache uploaded files (they're static)
        # Cache for 1 hour, serve stale while revalidating
        proxy_cache_valid 200 1h;
        add_header Cache-Control "public, max-age=3600";
    }
    
    # -------------------------------------------------------------------------
    # /health - Health Check Endpoint
    # -------------------------------------------------------------------------
    # Simple health check for Railway monitoring.
    # Returns 200 OK for any request to /health.
    
    location /health {
        access_log off;  # Don't log health checks
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
    
    # =========================================================================
    # STATIC FILES - React Application
    # =========================================================================
    # Serve the compiled React application.
    # This handles CSS, JS, images, and other static assets.
    
    # -------------------------------------------------------------------------
    # Assets with Cache Busting (JS, CSS with hashes)
    # -------------------------------------------------------------------------
    # Vite adds content hashes to filenames: index.abc123.js
    # These files can be cached forever because the name changes when content changes.
    
    location ~* \.(?:css|js|map|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp|avif)$ {
        # Try to serve the file directly
        try_files $uri =404;
        
        # Cache for 1 year (immutable because of content hashing)
        expires 1y;
        add_header Cache-Control "public, immutable";
        
        # Re-add security headers (location blocks override server-level)
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
    }
    
    # -------------------------------------------------------------------------
    # Static Files (without cache busting)
    # -------------------------------------------------------------------------
    # Files without content hashes should have shorter cache times.
    
    location /assets/ {
        # Assets from Vite build have hashes, cache aggressively
        expires 1y;
        add_header Cache-Control "public, immutable";
        
        # Try to serve file, return 404 if not found
        try_files $uri =404;
    }
    
    # -------------------------------------------------------------------------
    # index.html - Never Cache
    # -------------------------------------------------------------------------
    # The HTML file should never be cached because it references the latest JS/CSS.
    # If cached, users might load old HTML pointing to removed assets.
    
    location = /index.html {
        # Remove all caching
        expires -1;
        add_header Cache-Control "no-store, no-cache, no-transform, must-revalidate, proxy-revalidate, max-age=0";
        
        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
    }
    
    # -------------------------------------------------------------------------
    # SPA Fallback - Client-Side Routing
    # -------------------------------------------------------------------------
    # React Router handles routing on the client side.
    # All routes (/, /chat, /settings, etc.) should serve index.html.
    # The browser loads React, which then handles the routing.
    #
    # This is the KEY configuration for Single Page Applications!
    #
    # How it works:
    # 1. User requests /chat
    # 2. nginx tries to find /chat file (doesn't exist)
    # 3. Falls back to index.html
    # 4. React loads and router shows /chat view
    
    location / {
        # Try the exact file, then directory, then fall back to index.html
        try_files $uri $uri/ /index.html;
    }
    
    # -------------------------------------------------------------------------
    # Error Pages
    # -------------------------------------------------------------------------
    # Custom error handling. For SPA, errors should also return index.html
    # so React can handle them (e.g., show a 404 page component).
    
    error_page 404 /index.html;
    error_page 500 502 503 504 /index.html;
    
    # -------------------------------------------------------------------------
    # Deny Access to Hidden Files
    # -------------------------------------------------------------------------
    # Block access to hidden files (starting with .) for security.
    # This includes .git, .env, .htaccess, etc.
    
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # -------------------------------------------------------------------------
    # Deny Access to Backup and Source Files
    # -------------------------------------------------------------------------
    # Additional security - block common sensitive file patterns.
    
    location ~* \.(?:bak|conf|dist|fla|inl|psd|sh|sql|swf|zip)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# =============================================================================
# ADDITIONAL CONFIGURATION NOTES
# =============================================================================
#
# RAILWAY-SPECIFIC ADJUSTMENTS:
# -----------------------------------------------------------------------------
# Railway uses dynamic service discovery. If you need to use environment
# variables in this config, you have two options:
#
# OPTION 1: Use envsubst in a startup script
# Create a docker-entrypoint.sh:
#   #!/bin/sh
#   envsubst '${BACKEND_URL}' < /etc/nginx/conf.d/default.conf.template > /etc/nginx/conf.d/default.conf
#   exec nginx -g 'daemon off;'
#
# OPTION 2: Use Railway's private networking (recommended)
# Services can reference each other by name:
#   backend.railway.internal:8000
#
# This config uses OPTION 2 for simplicity.
#
# MONITORING:
# -----------------------------------------------------------------------------
# nginx logs are available in Railway dashboard:
# - Access log: /var/log/nginx/access.log
# - Error log: /var/log/nginx/error.log
#
# The Dockerfile configures nginx to log to stdout/stderr, which Railway captures.
#
# PERFORMANCE TUNING:
# -----------------------------------------------------------------------------
# For high-traffic applications, consider:
# - worker_processes: auto (in main nginx.conf)
# - worker_connections: 1024 (in main nginx.conf)
# - keepalive_timeout: 65
# - client_body_buffer_size: 128k
#
# =============================================================================
